# cibuildwheel configuration for PixelForge.
# Documented at: https://cibuildwheel.readthedocs.io/
#
# Most settings live in pyproject.toml ([tool.cibuildwheel]); this file
# is a lightweight per-platform overlay used by .github/workflows/release.yml.

[build]
build-frontend = "build"
build-verbosity = 1

[test]
requires = ["pytest", "numpy"]
command = "pytest {project}/python/tests"

# Linux: build inside the official manylinux2014 image (compatible with
# pip on virtually every distro back to RHEL 7 / Ubuntu 18.04).
[linux]
manylinux-x86_64-image = "manylinux_2_28"
manylinux-aarch64-image = "manylinux_2_28"
before-all = """
yum install -y cmake ninja-build || dnf install -y cmake ninja-build
"""

# Windows: cibuildwheel uses the wheel's bundled Python; we only need the
# build tooling. Visual Studio Build Tools are pre-installed on the runner.
[windows]
before-build = "pip install delvewheel"
# Bundle the runtime DLL into the wheel so end-users don't need PixelForge installed.
repair-wheel-command = "delvewheel repair -w {dest_dir} {wheel}"

# macOS: pin a deployment target so wheels work on older OS versions.
[macos]
environment = { MACOSX_DEPLOYMENT_TARGET = "11.0" }
repair-wheel-command = "delocate-wheel --require-archs {delocate_archs} -w {dest_dir} -v {wheel}"
